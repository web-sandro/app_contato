<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>app_contato</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>app_contato</h1>
    </header>
    <main>
        <button class="floating-btn">Contato</button>
        <button id="openContact" class="floating-btn">Contato</button>

        <div id="contactContainer" class="contact-overlay">
            <div class="contact-box">
                <span id="fecharContato" class="floating-btn">Fechar Contato</span>

                <iframe src="https://contato-2ayg.onrender.com" style="width:100%; height:100%; border:none;">
                </iframe>

            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 app_contato. Todos os direitos reservados.</p>
    </footer>
    <script>
        const btn = document.getElementById("openContact");
        const modal = document.getElementById("contactContainer");
        const fechar = document.getElementById("fecharContato");

        btn.onclick = () => {
            modal.classList.add("ativo");
        };

        fechar.onclick = () => {
            modal.classList.remove("ativo");
        };

        modal.onclick = (e) => {
            if (e.target === modal) {
                modal.classList.remove("ativo");
            }
        };
    </script>
</body>

</html>
